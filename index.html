<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>С Днём Рождения! 🎂</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #fffef9; /* чуть тёплый белый для уюта */
      background-image: 
        /* милые пиксельные сердечки с обводкой */
        url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cfilter id='glow' x='-50%' y='-50%' width='200%' height='200%'%3E%3CfeGaussianBlur stdDeviation='1.5' result='coloredBlur'/%3E%3CfeMerge%3E%3CfeMergeNode in='coloredBlur'/%3E%3CfeMergeNode in='SourceGraphic'/%3E%3C/feMerge%3E%3C/filter%3E%3C/defs%3E%3Cg fill='%23ff4d4d' filter='url(%23glow)' opacity='0.18'%3E%3C!-- сердце 1 --%3E%3Cpath d='M40 18 C32 10 22 12 22 22 C22 30 28 36 40 48 C52 36 58 30 58 22 C58 12 48 10 40 18 Z'/%3E%3C!-- сердце 2 --%3E%3Cpath d='M20 50 C14 44 10 50 10 58 C10 64 14 70 20 70 C26 70 30 66 30 60 C30 54 26 50 20 50 Z' transform='scale(0.7) translate(10,10)'/%3E%3C!-- маленькое сердечко --%3E%3Cpath d='M65 55 C60 52 57 55 57 60 C57 64 60 67 65 67 C70 67 73 64 73 60 C73 55 70 52 65 55 Z'/%3E%3C/g%3E%3C/svg%3E"),
        /* лёгкая пиксельная сетка для ретро-атмосферы */
        url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h1v1H0z M10 10h1v1h-1z M5 5h1v1H5z' fill='%23ffe6e6' opacity='0.08'/%3E%3C/svg%3E");
      background-repeat: repeat, repeat;
      background-size: 80px 80px, 20px 20px;
      font-family: 'Press Start 2P', cursive;
      color: #c00;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    h1 {
      font-size: 2.2rem;
      text-shadow: 4px 4px 0 #000, 6px 6px 0 #f44;
      margin-bottom: 40px;
      animation: glitch 3s infinite;
      z-index: 2;
    }
    .click-area {
      width: 320px;
      height: 320px;
      border: 8px solid #c00;
      border-image: linear-gradient(#c00, #f66) 1;
      image-rendering: pixelated;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 0 30px rgba(200,0,0,0.4);
      z-index: 2;
    }
    .click-area:hover {
      transform: scale(1.1) rotate(3deg);
    }
    .click-area img {src="IMG_20260321_021240_399.jpg"
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }
    .hint {
      margin-top: 30px;
      font-size: 1.3rem;
      animation: bounce 1.8s infinite;
      z-index: 2;
    }

    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-4px, 4px); }
      40% { transform: translate(4px, -4px); }
      60% { transform: translate(-4px, -4px); }
      80% { transform: translate(4px, 4px); }
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%     { transform: translateY(-12px); }
    }
  </style>
</head>
<body>

  <h1>ТЫКНИ НА МЕНЯ!</h1>
  <a href="love.html">
    <div class="click-area">
      <img src="images/photo1.jpg" alt="тык">
    </div>
  </a>
  <div class="hint">❤️ НАЖМИ ❤️</div>

</body>
</html>
