<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ЛЮБЛЮ!</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: #ffffff;
      background-image: url("data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%2260%22 height=%2255%22 viewBox=%220 0 60 55%22%3E%3Cpath fill=%22%23ff3333%22 opacity=%220.12%22 d=%22M30 13 C 23 5 13 6 13 15 C 13 23 20 29 30 40 C 40 29 47 23 47 15 C 47 6 37 5 30 13 z%22/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 60px 55px;
      font-family: 'Press Start 2P', cursive;
      color: #c00;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* остальной код без изменений (h1, .sub, .heart-btn, @keyframes и скрипт) */
    h1 { font-size: 3.5rem; margin: 0; text-shadow: 6px 6px 0 #000; animation: pulse 1.6s infinite, glitch 4s infinite; z-index: 5; }
    .sub { font-size: 1.4rem; margin: 30px 0 80px; max-width: 90%; text-align: center; line-height: 2; animation: floatText 7s infinite ease-in-out; z-index: 5; }
    .heart-btn { font-size: 7rem; background: none; border: none; cursor: pointer; animation: beat 1.2s infinite; z-index: 10; }
    .heart-btn:hover { transform: scale(1.4); }
    .particle { position: absolute; pointer-events: none; font-size: 1.8rem; animation: rise linear forwards; z-index: 2; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
    @keyframes beat { 0%,100% { transform: scale(1); } 35% { transform: scale(1.35); } 70% { transform: scale(1); } }
    @keyframes rise { 0% { transform: translateY(120vh) rotate(0deg); opacity: 0.9; } 100% { transform: translateY(-30vh) rotate(1080deg); opacity: 0; } }
    @keyframes floatText { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(2deg); } }
    @keyframes glitch { 0-4%,100% { transform: translate(0); } 5% { transform: translate(-3px,3px); } 7% { transform: translate(3px,-3px); } }
  </style>
</head>
<body>
  <h1>Я ТЕБЯ</h1>
  <div class="sub">ЛЮБЛЮ ЛЮБЛЮ ЛЮБЛЮ ЛЮБЛЮ ЛЮБЛЮ<br>ЛЮБЛЮ ОЧЕНЬ СИЛЬНО ЛЮБЛЮ ЛЮБЛЮ ЛЮБЛЮ</div>
  <button class="heart-btn" onclick="location.href='wishes.html'">❤️</button>
  <script>
    const hearts = ["❤️","💖","💕","💗","💘","💝","🖤","💓"];
    function spawn() {
      const p = document.createElement("div");
      p.className = "particle";
      p.textContent = hearts[Math.floor(Math.random()*hearts.length)];
      p.style.left = Math.random()*100 + "vw";
      p.style.fontSize = (Math.random()*2.5 + 1.8) + "rem";
      p.style.animationDuration = (Math.random()*9 + 7) + "s";
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 12000);
    }
    setInterval(spawn, 280);
  </script>
</body>
</html>
